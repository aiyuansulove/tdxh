<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天地鲟鳇 - 内容管理</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 { color: #2c2c2c; margin-bottom: 20px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: #C9A96E;
            color: white;
            padding: 14px 32px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn:hover { background: #b8954f; }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: left;
        }
        .info h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }
        .info ul {
            margin: 0;
            padding-left: 20px;
            color: #666;
            font-size: 13px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>天地鲟鳇 - 内容管理</h1>
        <p>点击下方按钮，通过 GitHub 登录来管理网站内容。</p>
        <a href="https://github.com/aiyuansulove/tdxh" class="btn">在 GitHub 中编辑内容</a>
        <div class="info">
            <h3>管理说明</h3>
            <ul>
                <li>点击按钮跳转到 GitHub 仓库</li>
                <li>在 content/news 文件夹中编辑或添加新闻</li>
                <li>在 content/products 文件夹中编辑产品</li>
                <li>图片上传到 static/images 文件夹</li>
                <li>修改后会自动重新构建并发布</li>
            </ul>
        </div>
    </div>
</body>
</html>
