<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天地鲟鳇 - 后台管理</title>
  <link rel="stylesheet" href="admin.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-logo"><img src="/images/天地鲟鳇logo.jpg" alt="天地鲟鳇"></div>
      <h1 class="login-title">内容管理系统</h1>
      <p class="login-subtitle">天地鲟鳇 · 后台管理</p>
      <div class="login-form">
        <label class="login-label">GitHub 个人访问令牌</label>
        <input type="password" id="tokenInput" class="login-input" placeholder="输入你的 GitHub Personal Access Token">
        <p class="login-hint">需要 <strong>repo</strong> 权限。<a href="https://github.com/settings/tokens" target="_blank" class="login-link">去生成 →</a></p>
        <button id="loginBtn" class="login-btn">进入后台</button>
        <p id="loginError" class="login-error"></p>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="/images/天地鲟鳇logo.jpg" alt="Logo" class="sidebar-logo">
        <span class="sidebar-title">天地鲟鳇</span>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- 由 JS 动态渲染 -->
      </nav>
      <div class="sidebar-footer">
        <span id="sidebarStatus" class="sidebar-status">未连接</span>
        <button id="logoutBtn" class="sidebar-logout">退出</button>
      </div>
    </aside>

    <!-- Editor Panel -->
    <div class="editor-layout" id="editorLayout">
      <!-- 未选择时的欢迎页 -->
      <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-content">
          <img src="/images/天地鲟鳇logo.jpg" alt="天地鲟鳇" class="welcome-logo">
          <h2>欢迎使用内容管理系统</h2>
          <p>请从左侧选择要编辑的板块</p>
        </div>
      </div>

      <!-- 编辑器 -->
      <div id="editorPanel" class="editor-container" style="display:none">
        <!-- 顶部：标题和保存按钮 -->
        <div class="editor-topbar">
          <div class="editor-topbar-info">
            <h3 id="editorTitle">编辑板块</h3>
            <span id="editorPath" class="editor-path"></span>
          </div>
          <div class="editor-topbar-actions">
            <span id="editorStatus" class="editor-status"></span>
            <button id="editorSaveBtn" class="btn btn-primary">💾 保存</button>
          </div>
        </div>

        <!-- 表单区域 -->
        <div id="sectionForm" class="editor-form"></div>

        <!-- 底部：提交信息 -->
        <div class="editor-bottom">
          <input type="text" id="commitMsg" class="commit-input" placeholder="提交说明（如：更新首页Hero）">
        </div>
      </div>
    </div>

    <!-- Image upload input -->
    <input type="file" id="imageFileInput" accept="image/*" style="display:none">

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
