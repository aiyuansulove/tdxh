backend:
  name: github
  repo: aiyuansulove/tdxh
  branch: master
  commit_messages:
    create: 'Create {{collection}} "{{slug}}"'
    update: 'Update {{collection}} "{{slug}}"'
    delete: 'Delete {{collection}} "{{slug}}"'
    uploadMedia: 'Upload "{{path}}"'
    deleteMedia: 'Delete "{{path}}"'

local_backend: false

media_folder: "static/images"
public_folder: "/tdxh/images"
base_url: "https://aiyuansulove.github.io/tdxh"
site_url: "https://aiyuansulove.github.io/tdxh"
display_url: "https://aiyuansulove.github.io/tdxh"

collections:
  - name: "news"
    label: "新闻动态"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "日期", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
      - {label: "正文", name: "body", widget: "markdown"}

  - name: "products"
    label: "产品展示"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "描述", name: "body", widget: "markdown"}

  - name: "about"
    label: "关于我们"
    folder: "content"
    files:
      - name: "about"
        label: "关于我们"
        file: "content/about.md"
        fields:
          - {label: "正文", name: "body", widget: "markdown"}