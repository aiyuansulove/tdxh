<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天地鲟鳇 - 内容管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #C9A96E;
            display: block;
            margin: 0 auto 30px;
        }
        h1 {
            text-align: center;
            color: #2c2c2c;
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 0.95em;
        }
        .btn {
            display: block;
            background: linear-gradient(135deg, #C9A96E, #e8d5a3);
            color: white;
            text-align: center;
            padding: 18px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            margin: 20px auto;
            max-width: 320px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(201,169,98,0.4);
        }
        .guide {
            margin-top: 40px;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 12px;
        }
        .guide h3 {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .guide ul {
            list-style: none;
            color: #555;
            font-size: 0.9em;
            line-height: 2;
        }
        .guide li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .guide li::before {
            content: "✓";
            color: #C9A96E;
            font-weight: bold;
        }
        .notice {
            margin-top: 30px;
            padding: 20px;
            background: #fff8e6;
            border-radius: 10px;
            border-left: 4px solid #C9A96E;
        }
        .notice p {
            color: #666;
            font-size: 0.85em;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/tdxh/images/天地鲟鳇logo.jpg" alt="天地鲟鳇" class="logo">
        <h1>天地鲟鳇 - 内容管理</h1>
        <p class="subtitle">选择一个方式来管理您的网站内容</p>

        <a href="https://github.com/aiyuansulove/tdxh/edit/master/content/news/index.md" target="_blank" class="btn">
            📝 编辑新闻动态
        </a>

        <a href="https://github.com/aiyuansulove/tdxh/edit/master/content/products/index.md" target="_blank" class="btn">
            🛒 编辑产品展示
        </a>

        <a href="https://github.com/aiyuansulove/tdxh/edit/master/content/about.md" target="_blank" class="btn">
            📋 编辑关于我们
        </a>

        <a href="https://github.com/aiyuansulove/tdxh" target="_blank" class="btn" style="background: #333;">
            📁 查看所有内容文件
        </a>

        <div class="guide">
            <h3>📖 使用说明</h3>
            <ul>
                <li>点击上方按钮，跳转到 GitHub 编辑器</li>
                <li>在打开的页面中修改内容</li>
                <li>修改完成后，点击绿色的 "Commit changes" 按钮</li>
                <li>网站会在 2-3 分钟内自动更新</li>
            </ul>
        </div>

        <div class="notice">
            <p><strong>💡 提示：</strong>GitHub 编辑器支持实时预览，修改内容时可以看到格式效果。如果需要上传图片，请先在 GitHub 的 static/images 文件夹中上传。</p>
        </div>
    </div>
</body>
</html>
