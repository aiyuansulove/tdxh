{{ define "content" }}
<section class="section" style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center">
  <div>
    <h1 style="font-size:4em;color:var(--gold);margin-bottom:16px">404</h1>
    <h2 style="font-size:1.5em;color:var(--text2);margin-bottom:24px">页面未找到</h2>
    <p style="color:var(--text3);margin-bottom:32px;max-width:400px;margin-left:auto;margin-right:auto">
      您访问的页面不存在，可能已被移除或地址输入有误。
    </p>
    <a href="{{ "/" | relURL }}" class="contact-btn" style="display:inline-block">返回首页 →</a>
  </div>
</section>
{{ end }}
